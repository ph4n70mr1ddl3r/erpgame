<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahay Depot - CEO Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; }
        .nav-link { transition: all 0.15s; display: block; padding: 0.6rem 1rem; border-radius: 0.5rem; color: #e2e8f0; text-decoration: none; font-size: 0.9rem; margin-bottom: 0.15rem; }
        .nav-link:hover, .nav-link.active { background: #334155; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1rem; }
        .btn-primary { background: #3b82f6; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; transition: all 0.15s; font-size: 0.9rem; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; transition: all 0.15s; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #22c55e; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; transition: all 0.15s; }
        .btn-success:hover { background: #16a34a; }
        .btn-warning { background: #f59e0b; color: #0f172a; padding: 0.5rem 1rem; border-radius: 0.5rem; border: none; cursor: pointer; transition: all 0.15s; font-weight: 600; }
        .btn-warning:hover { background: #d97706; }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
        select, input[type="text"], input[type="number"] {
            background: #0f172a; border: 1px solid #475569; color: #e2e8f0; padding: 0.5rem; border-radius: 0.5rem; width: 100%;
        }
        select:focus, input:focus { outline: none; border-color: #3b82f6; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.75rem; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #334155; }
        td { padding: 0.75rem; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
        tr:hover td { background: #1e293b; }
        .message { padding: 0.5rem 0.75rem; border-radius: 0.5rem; margin-bottom: 0.25rem; font-size: 0.85rem; }
        .msg-info { background: #1e3a5f; border-left: 3px solid #3b82f6; }
        .msg-event { background: #3b2e1e; border-left: 3px solid #f59e0b; }
        .msg-error { background: #3b1e1e; border-left: 3px solid #ef4444; }
        .msg-success { background: #1e3b1e; border-left: 3px solid #22c55e; }
        .msg-decision { background: #2e1e3b; border-left: 3px solid #a78bfa; }
        .msg-delegated { background: #1e2e3b; border-left: 3px solid #06b6d4; }
        .progress-bar { background: #0f172a; border-radius: 0.5rem; height: 0.5rem; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 0.5rem; transition: width 0.3s; }
        .choice-card { background: #0f172a; border: 2px solid #334155; border-radius: 0.75rem; padding: 1rem; cursor: pointer; transition: all 0.15s; }
        .choice-card:hover { border-color: #3b82f6; background: #1e293b; }
        .choice-card.risk-low { border-left: 4px solid #22c55e; }
        .choice-card.risk-medium { border-left: 4px solid #f59e0b; }
        .choice-card.risk-high { border-left: 4px solid #ef4444; }
        .toggle-track { width: 44px; height: 24px; border-radius: 12px; background: #334155; position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
        .toggle-track.active { background: #3b82f6; }
        .toggle-thumb { width: 20px; height: 20px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 2px; transition: left 0.2s; }
        .toggle-track.active .toggle-thumb { left: 22px; }
        @media (max-width: 768px) {
            .sidebar { display: none !important; }
            .sidebar.open { display: flex !important; position: fixed; z-index: 50; top: 0; left: 0; width: 250px; height: 100vh; background: #1e293b; flex-direction: column; }
            .mobile-menu { display: block !important; }
            .main-content { margin-left: 0 !important; }
            .form-grid { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>
    <div style="display: flex; min-height: 100vh;">
        <aside class="sidebar" style="width: 240px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 40;">
            <div style="padding: 1.25rem; border-bottom: 1px solid #334155;">
                <div style="font-size: 1.25rem; font-weight: 700; color: #f59e0b;">BAHAY DEPOT</div>
                <div style="font-size: 0.75rem; color: #64748b;">CEO Simulator</div>
                <div style="margin-top: 0.5rem; font-size: 0.8rem; color: #94a3b8;">{{ current_quarter }}</div>
            </div>
            <nav style="flex: 1; padding: 0.5rem; overflow-y: auto;">
                <a href="/" class="nav-link {% if active_page == "dashboard" %}active{% endif %}">&#128200; Dashboard</a>
                <a href="/decisions" class="nav-link {% if active_page == "decisions" %}active{% endif %}">&#9888; Decisions</a>
                <a href="/stores" class="nav-link {% if active_page == "stores" %}active{% endif %}">&#127970; Stores</a>
                <a href="/executives" class="nav-link {% if active_page == "executives" %}active{% endif %}">&#128101; Executives</a>
                <a href="/policies" class="nav-link {% if active_page == "policies" %}active{% endif %}">&#128220; Policies</a>
                <a href="/products" class="nav-link {% if active_page == "products" %}active{% endif %}">&#128230; Products</a>
                <a href="/upgrades" class="nav-link {% if active_page == "upgrades" %}active{% endif %}">&#128295; Upgrades</a>
                <a href="/loyalty" class="nav-link {% if active_page == "loyalty" %}active{% endif %}">&#11088; Loyalty</a>
                <a href="/campaigns" class="nav-link {% if active_page == "campaigns" %}active{% endif %}">&#127906; Campaigns</a>
                <a href="/ecommerce" class="nav-link {% if active_page == "ecommerce" %}active{% endif %}">&#128722; E-commerce</a>
                <a href="/delegation" class="nav-link {% if active_page == "delegation" %}active{% endif %}">&#128640; Delegation</a>
                <a href="/board" class="nav-link {% if active_page == "board" %}active{% endif %}">&#128203; Board</a>
                <a href="/competitors" class="nav-link {% if active_page == "competitors" %}active{% endif %}">&#128640; Competitors</a>
                <a href="/finances" class="nav-link {% if active_page == "finances" %}active{% endif %}">&#128176; Finances</a>
                <a href="/achievements" class="nav-link {% if active_page == "achievements" %}active{% endif %}">&#11088; Achievements</a>
                <a href="/events" class="nav-link {% if active_page == "events" %}active{% endif %}">&#128240; Event Log</a>
            </nav>
            <div style="padding: 0.75rem; border-top: 1px solid #334155;">
                <form action="/new-game" method="POST" style="margin: 0;">
                    <button type="submit" style="display: block; width: 100%; text-align: center; padding: 0.5rem; border-radius: 0.5rem; background: #334155; color: #94a3b8; border: none; text-decoration: none; font-size: 0.8rem; cursor: pointer;">New Game</button>
                </form>
            </div>
        </aside>

        <main class="main-content" style="margin-left: 240px; flex: 1; padding: 1.5rem; max-width: 100%; min-width: 0;">
            <button class="mobile-menu" onclick="document.querySelector('.sidebar').classList.toggle('open')" style="display: none; margin-bottom: 1rem; background: #334155; color: #e2e8f0; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer;">&#9776; Menu</button>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
